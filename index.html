<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeoSolar — Painel SAC</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --yellow:      #FFD04C;
      --yellow-dim:  rgba(255,208,76,0.13);
      --yellow-glow: rgba(255,208,76,0.06);
      --gray-brand:  #565759;
      --bg:          #111111;
      --surface:     #1a1a1a;
      --surface2:    #212121;
      --border:      rgba(255,255,255,0.07);
      --border-y:    rgba(255,208,76,0.2);
      --text:        #f0ede8;
      --muted:       #888580;
      --subtle:      #4a4845;
      --red:         #e85c4a;
      --red-bg:      rgba(232,92,74,0.1);
      --green:       #5ec987;
      --green-bg:    rgba(94,201,135,0.1);
      --orange:      #f07a30;
      --purple:      #a78bfa;
      --cyan:        #22d3ee;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'Barlow',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      font-size:13px;
    }

    /* TOP BAR */
    .topbar {
      display:flex; align-items:center; justify-content:space-between;
      padding:0 24px; height:52px;
      background:#0d0d0d;
      border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:100;
    }
    .topbar-left { display:flex; align-items:center; gap:14px; }
    .logo-icon {
      width:30px; height:30px; border-radius:6px;
      background:var(--yellow);
      display:flex; align-items:center; justify-content:center;
    }
    .logo-icon svg { width:18px; height:18px; }
    .logo-text {
      font-family:'Barlow Condensed',sans-serif;
      font-weight:800; font-size:17px;
      letter-spacing:2px; text-transform:uppercase;
      color:var(--text);
    }
    .logo-sep { color:var(--subtle); }
    .logo-sub {
      font-family:'Barlow Condensed',sans-serif;
      font-weight:500; font-size:13px;
      letter-spacing:3px; text-transform:uppercase;
      color:var(--muted);
    }
    .live-pill {
      display:none; align-items:center; gap:5px;
      background:rgba(94,201,135,0.1);
      border:1px solid rgba(94,201,135,0.2);
      border-radius:20px; padding:3px 10px;
      font-size:10px; font-weight:700;
      color:var(--green); letter-spacing:1.5px;
      text-transform:uppercase;
    }
    .live-pill.show { display:flex; }
    .live-dot {
      width:5px; height:5px; border-radius:50%;
      background:var(--green);
      animation:pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(1.4)} }
    .topbar-right { display:flex; align-items:center; gap:14px; }
    .last-update {
      font-family:'Barlow Condensed',sans-serif;
      font-size:11px; letter-spacing:1.5px;
      text-transform:uppercase; color:var(--subtle);
    }
    .btn-refresh {
      display:flex; align-items:center; gap:6px;
      background:var(--yellow-dim);
      border:1px solid var(--border-y);
      border-radius:6px; padding:7px 16px;
      font-family:'Barlow Condensed',sans-serif;
      font-size:11px; font-weight:700;
      letter-spacing:2px; text-transform:uppercase;
      color:var(--yellow); cursor:pointer;
      transition:background .2s;
    }
    .btn-refresh:hover { background:rgba(255,208,76,.22); }
    .btn-refresh.spinning svg { animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ALERT */
    .alert-bar {
      display:none; align-items:center; gap:10px;
      padding:9px 24px;
      background:rgba(232,92,74,0.07);
      border-bottom:1px solid rgba(232,92,74,0.18);
      font-family:'Barlow Condensed',sans-serif;
      font-size:11px; font-weight:700;
      letter-spacing:2px; text-transform:uppercase;
      color:var(--red);
    }
    .alert-bar.show { display:flex; }

    /* VIEWS */
    #viewLoading,#viewError { display:none; }
    #viewLoading.active,#viewError.active { display:flex; }
    #viewDash { display:none; }
    #viewDash.active { display:block; }

    .loading-screen {
      flex-direction:column; align-items:center; justify-content:center;
      min-height:calc(100vh - 52px); gap:18px;
    }
    .loader-ring {
      width:44px; height:44px;
      border:2px solid var(--border);
      border-top-color:var(--yellow);
      border-radius:50%;
      animation:spin .8s linear infinite;
    }
    .loading-label {
      font-family:'Barlow Condensed',sans-serif;
      font-size:11px; letter-spacing:4px;
      text-transform:uppercase; color:var(--subtle);
    }
    .error-screen {
      flex-direction:column; align-items:center; justify-content:center;
      min-height:calc(100vh - 52px); gap:10px;
    }
    .error-title {
      font-family:'Barlow Condensed',sans-serif;
      font-size:64px; font-weight:800;
      color:var(--yellow); line-height:1;
    }
    .error-detail { color:var(--muted); font-size:13px; max-width:360px; text-align:center; }
    .btn-retry {
      margin-top:8px;
      background:var(--yellow-dim); border:1px solid var(--border-y);
      border-radius:6px; padding:8px 22px;
      font-family:'Barlow Condensed',sans-serif;
      font-size:11px; font-weight:700;
      letter-spacing:2px; text-transform:uppercase;
      color:var(--yellow); cursor:pointer;
    }

    /* DASH */
    .dash { padding:18px 24px; display:flex; flex-direction:column; gap:14px; }

    /* KPI STRIP */
    .kpi-strip { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
    .kpi {
      background:var(--surface);
      border:1px solid var(--border);
      border-top:2px solid var(--kpi-accent,var(--yellow));
      border-radius:8px; padding:16px 18px;
    }
    .kpi-label {
      font-family:'Barlow Condensed',sans-serif;
      font-size:10px; font-weight:700;
      letter-spacing:3px; text-transform:uppercase;
      color:var(--muted); margin-bottom:8px;
    }
    .kpi-value {
      font-family:'Barlow Condensed',sans-serif;
      font-size:52px; font-weight:800;
      line-height:1; letter-spacing:-2px;
      color:var(--text);
    }
    .kpi-value.danger { color:var(--red); }
    .kpi-value.warn   { color:var(--orange); }
    .kpi-value.ok     { color:var(--green); }
    .kpi-sub {
      margin-top:5px; font-size:11px;
      color:var(--muted);
    }
    .kpi-sub.danger { color:var(--red); }
    .kpi-sub.warn   { color:var(--orange); }
    .kpi-sub.ok     { color:var(--green); }

    /* LAYOUT */
    .main-grid {
      display:grid;
      grid-template-columns:1fr 300px;
      gap:14px;
    }
    .col-left  { display:flex; flex-direction:column; gap:14px; }
    .col-right { display:flex; flex-direction:column; gap:14px; }

    /* CARD */
    .card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:8px; overflow:hidden;
    }
    .card-head {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 16px 11px;
      border-bottom:1px solid var(--border);
    }
    .card-title {
      font-family:'Barlow Condensed',sans-serif;
      font-size:10px; font-weight:700;
      letter-spacing:3px; text-transform:uppercase;
      color:var(--yellow);
    }
    .card-badge {
      font-family:'Barlow Condensed',sans-serif;
      font-size:11px; font-weight:700; letter-spacing:1px;
      background:var(--yellow-dim); color:var(--yellow);
      border:1px solid var(--border-y);
      border-radius:4px; padding:2px 8px;
    }

    /* AGENT ROWS */
    .agent-list { display:flex; flex-direction:column; }
    .agent-row {
      display:grid; grid-template-columns:34px 1fr 36px;
      align-items:center; gap:12px;
      padding:9px 16px;
      border-bottom:1px solid var(--border);
      transition:background .15s;
    }
    .agent-row:last-child { border-bottom:none; }
    .agent-row:hover { background:var(--surface2); }
    .avatar {
      width:34px; height:34px; border-radius:7px;
      display:flex; align-items:center; justify-content:center;
      font-family:'Barlow Condensed',sans-serif;
      font-size:12px; font-weight:700; letter-spacing:.5px;
      flex-shrink:0;
    }
    .agent-name {
      font-family:'Barlow Condensed',sans-serif;
      font-size:13px; font-weight:600;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .agent-bar-wrap {
      display:flex; height:4px; gap:2px;
      margin:5px 0 4px; border-radius:2px; overflow:hidden;
    }
    .agent-seg { height:4px; border-radius:1px; min-width:2px; transition:width .4s; }
    .agent-sub { font-size:10px; color:var(--muted); }
    .agent-sub.danger { color:var(--red); }
    .agent-sub.warn   { color:var(--orange); }
    .agent-total {
      font-family:'Barlow Condensed',sans-serif;
      font-size:22px; font-weight:800;
      text-align:right; line-height:1;
    }
    .agent-total.ok     { color:var(--yellow); }
    .agent-total.warn   { color:var(--orange); }
    .agent-total.danger { color:var(--red); }

    /* STATUS LIST */
    .status-list { display:flex; flex-direction:column; }
    .status-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 16px;
      border-bottom:1px solid var(--border);
    }
    .status-row:last-child { border-bottom:none; }
    .status-left { display:flex; align-items:center; gap:8px; min-width:0; }
    .status-bar-wrap { flex:1; height:3px; background:var(--border); border-radius:2px; margin:0 10px; overflow:hidden; min-width:30px; }
    .status-bar-fill { height:100%; border-radius:2px; transition:width .5s; }
    .status-name {
      font-size:11px; color:var(--muted);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      max-width:110px;
    }
    .status-cnt {
      font-family:'Barlow Condensed',sans-serif;
      font-size:18px; font-weight:800;
      min-width:28px; text-align:right;
    }

    /* TYPE BOXES */
    .type-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; padding:14px 16px; }
    .type-box {
      background:var(--surface2);
      border:1px solid var(--border);
      border-radius:7px; padding:12px 14px;
      text-align:center;
    }
    .type-box-label {
      font-family:'Barlow Condensed',sans-serif;
      font-size:10px; font-weight:700;
      letter-spacing:2px; text-transform:uppercase;
      color:var(--muted); margin-bottom:6px;
    }
    .type-box-val {
      font-family:'Barlow Condensed',sans-serif;
      font-size:34px; font-weight:800;
      line-height:1;
    }

    /* CRIT TABLE */
    .crit-table { width:100%; border-collapse:collapse; }
    .crit-table th {
      font-family:'Barlow Condensed',sans-serif;
      font-size:10px; font-weight:700;
      letter-spacing:2.5px; text-transform:uppercase;
      color:var(--subtle); text-align:left;
      padding:0 16px 10px;
      border-bottom:1px solid var(--border);
    }
    .crit-table td {
      padding:10px 16px;
      border-bottom:1px solid var(--border);
      vertical-align:middle;
    }
    .crit-table tr:last-child td { border-bottom:none; }
    .crit-table tr:hover td { background:var(--surface2); }
    .t-num {
      font-family:'Barlow Condensed',sans-serif;
      font-size:13px; font-weight:700;
      color:var(--yellow); letter-spacing:.5px;
    }
    .t-sub {
      font-size:12px; color:var(--text);
      max-width:260px; white-space:nowrap;
      overflow:hidden; text-overflow:ellipsis;
    }
    .pill {
      display:inline-block;
      font-family:'Barlow Condensed',sans-serif;
      font-size:10px; font-weight:700;
      letter-spacing:1px; text-transform:uppercase;
      padding:2px 7px; border-radius:3px; white-space:nowrap;
    }
    .pill-y { background:var(--yellow-dim); color:var(--yellow); border:1px solid var(--border-y); }
    .pill-o { background:rgba(240,122,48,.1); color:var(--orange); border:1px solid rgba(240,122,48,.2); }
    .pill-g { background:var(--green-bg); color:var(--green); border:1px solid rgba(94,201,135,.2); }
    .pill-n { background:rgba(255,255,255,.05); color:var(--muted); border:1px solid var(--border); }
    .sla-b { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:12px; letter-spacing:.5px; color:var(--red); }
    .sla-w { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:12px; letter-spacing:.5px; color:var(--orange); }
    .no-data {
      text-align:center; padding:28px 16px;
      font-family:'Barlow Condensed',sans-serif;
      font-size:11px; letter-spacing:2px;
      text-transform:uppercase; color:var(--subtle);
    }

    .legend { display:flex; align-items:center; gap:12px; }
    .leg { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--muted); }
    .leg-dot { width:7px; height:7px; border-radius:2px; }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
        <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
        <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
      </svg>
    </div>
    <span class="logo-text">NeoSolar</span>
    <span class="logo-sep">/</span>
    <span class="logo-sub">SAC</span>
    <div class="live-pill" id="liveBadge">
      <div class="live-dot"></div>ao vivo
    </div>
  </div>
  <div class="topbar-right">
    <span class="last-update" id="lastUpdate">—</span>
    <button class="btn-refresh" id="btnRefresh" onclick="loadData()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M3 12a9 9 0 019-9 9.75 9.75 0 016.74 2.74L21 8"/><path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 01-9 9 9.75 9.75 0 01-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
      </svg>
      Atualizar
    </button>
  </div>
</header>

<div class="alert-bar" id="alertBar">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  <span id="alertMsg"></span>
</div>

<div class="loading-screen" id="viewLoading">
  <div class="loader-ring"></div>
  <div class="loading-label">Carregando</div>
</div>

<div class="error-screen" id="viewError">
  <div class="error-title">!</div>
  <div class="error-detail" id="errorMsg">Erro ao conectar</div>
  <button class="btn-retry" onclick="loadData()">Tentar novamente</button>
</div>

<div class="dash" id="viewDash">

  <!-- KPIs -->
  <div class="kpi-strip">
    <div class="kpi" style="--kpi-accent:var(--yellow)">
      <div class="kpi-label">Ativos Agora</div>
      <div class="kpi-value" id="mOpen">—</div>
      <div class="kpi-sub" id="mOpenSub"></div>
    </div>
    <div class="kpi" style="--kpi-accent:var(--red)">
      <div class="kpi-label">SLA Rompido</div>
      <div class="kpi-value" id="mSla">—</div>
      <div class="kpi-sub" id="mSlaSub"></div>
    </div>
    <div class="kpi" style="--kpi-accent:var(--orange)">
      <div class="kpi-label">TMA Médio</div>
      <div class="kpi-value" id="mTma">—</div>
      <div class="kpi-sub" id="mTmaSub"></div>
    </div>
    <div class="kpi" style="--kpi-accent:var(--red)">
      <div class="kpi-label">Escalados</div>
      <div class="kpi-value" id="mEsc">—</div>
      <div class="kpi-sub" id="mEscSub"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-grid">
    <div class="col-left">

      <!-- TIPOS + AGENTES -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">

        <div class="card">
          <div class="card-head">
            <span class="card-title">Tipos de Status</span>
          </div>
          <div class="type-grid" id="typeGrid"></div>
          <div style="padding:0 16px 14px">
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Distribuição</div>
            <div id="statusDist"></div>
          </div>
        </div>

        <div class="card">
          <div class="card-head">
            <span class="card-title">Por Agente</span>
            <div class="legend">
              <div class="leg"><div class="leg-dot" style="background:var(--yellow)"></div>Ab.</div>
              <div class="leg"><div class="leg-dot" style="background:var(--orange)"></div>Pend.</div>
              <div class="leg"><div class="leg-dot" style="background:var(--red)"></div>Esc.</div>
            </div>
          </div>
          <div class="agent-list" id="agentRows"></div>
        </div>
      </div>

      <!-- CRÍTICOS -->
      <div class="card">
        <div class="card-head">
          <span class="card-title">Tickets Críticos — SLA em Risco ou Rompido</span>
          <span class="card-badge" id="critCount">0</span>
        </div>
        <div style="overflow-x:auto">
          <table class="crit-table">
            <thead><tr>
              <th>Ticket</th><th>Assunto</th><th>Agente</th><th>Status</th><th>SLA</th>
            </tr></thead>
            <tbody id="critRows"></tbody>
          </table>
        </div>
      </div>

    </div>

    <div class="col-right">
      <div class="card">
        <div class="card-head"><span class="card-title">Status Customizados</span></div>
        <div class="status-list" id="statusList"></div>
      </div>
    </div>
  </div>
</div>

<script>
  function show(id) {
    ['viewLoading','viewError','viewDash'].forEach(v => {
      document.getElementById(v).classList.toggle('active', v === id);
    });
  }
  function setEl(id, val, cls) {
    const el = document.getElementById(id); if (!el) return;
    el.textContent = val;
    if (cls !== undefined) el.className = (el.className||'').replace(/\b(ok|warn|danger)\b/g,'').trim() + (cls ? ' '+cls : '');
  }
  async function zoho(path, params={}) {
    const qs = new URLSearchParams({path,...params}).toString();
    const r = await fetch(`/api/zoho?${qs}`);
    if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error||`HTTP ${r.status}`); }
    return r.json();
  }

  async function loadData() {
    show('viewLoading');
    const btn = document.getElementById('btnRefresh');
    btn.classList.add('spinning');
    try {
      const [allData, agentsData] = await Promise.all([
        zoho('tickets', {}),
        zoho('agents', { limit: 100 })
      ]);

      const allActive = allData.data || [];

      // Mapa agentes com paginação
      const agentNames = {};
      const mapAgent = a => {
        const fn=(a.firstName||'').trim(), ln=(a.lastName||'').trim();
        agentNames[a.id] = fn ? (ln?fn+' '+ln:fn) : (a.name||'').trim()||a.id;
      };
      (agentsData.data||[]).forEach(mapAgent);
      if ((agentsData.data||[]).length === 100) {
        let from = 101;
        while (from <= 500) {
          const pg = await zoho('agents',{limit:100,from});
          const b = pg.data||[]; b.forEach(mapAgent);
          if (b.length < 100) break;
          from += 100;
        }
      }

      const open     = allActive.filter(t => t.statusType === 'Open');
      const pending  = allActive.filter(t => t.statusType === 'On Hold');
      const escalated= allActive.filter(t => t.priority === 'Vencido');

      renderDash({allActive, open, pending, escalated, agentNames});

      document.getElementById('lastUpdate').textContent =
        'ATUALIZADO ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      document.getElementById('liveBadge').classList.add('show');
      show('viewDash');
    } catch(err) {
      document.getElementById('errorMsg').textContent = `Erro: ${err.message}`;
      show('viewError');
    } finally {
      btn.classList.remove('spinning');
    }
  }

  function renderDash({allActive, open, pending, escalated, agentNames}) {
    const now = Date.now();
    const COLORS = ['var(--yellow)','var(--orange)','var(--purple)','var(--cyan)','var(--green)','var(--red)','#f9a8d4','#94a3b8'];

    // KPIs
    setEl('mOpen', allActive.length);
    setEl('mOpenSub', `${open.length} abertos · ${pending.length} pendentes`);

    const withDue  = allActive.filter(t=>t.dueDate);
    const breached = withDue.filter(t=>new Date(t.dueDate)<now);
    setEl('mSla', breached.length, breached.length>0?'danger':'ok');
    setEl('mSlaSub', breached.length>0?`${withDue.length-breached.length} dentro do prazo`:'todos no prazo', breached.length>0?'danger':'ok');

    const withT = allActive.filter(t=>t.createdTime&&t.modifiedTime);
    const avgMs = withT.length ? withT.reduce((s,t)=>s+(new Date(t.modifiedTime)-new Date(t.createdTime)),0)/withT.length : null;
    const avgH  = avgMs ? Math.round(avgMs/3600000) : null;
    setEl('mTma', avgH!==null?avgH+'h':'N/A');
    setEl('mTmaSub', avgH!==null?(avgH<=48?'dentro da meta':'acima da meta'):'', avgH!==null&&avgH<=48?'ok':'warn');

    setEl('mEsc', escalated.length, escalated.length>5?'danger':escalated.length>0?'warn':'ok');
    setEl('mEscSub', escalated.length>0?`${escalated.length} com priority = Vencido`:'nenhum escalado', escalated.length>0?'danger':'ok');

    // Alert
    const ab = document.getElementById('alertBar');
    if (breached.length>0) {
      document.getElementById('alertMsg').textContent = `${breached.length} ticket(s) com SLA rompido — ação necessária`;
      ab.classList.add('show');
    } else ab.classList.remove('show');

    // Type Grid
    document.getElementById('typeGrid').innerHTML = [
      {label:'Abertos',  val:open.length,     color:'var(--yellow)'},
      {label:'Pendentes',val:pending.length,   color:'var(--orange)'},
      {label:'Escalados',val:escalated.length, color:'var(--red)'},
    ].map(s=>`
      <div class="type-box">
        <div class="type-box-label">${s.label}</div>
        <div class="type-box-val" style="color:${s.color}">${s.val}</div>
      </div>`).join('');

    // Status dist (top status)
    const sCnt = {}; allActive.forEach(t=>{ sCnt[t.status]=(sCnt[t.status]||0)+1; });
    const top = Object.entries(sCnt).sort((a,b)=>b[1]-a[1]).slice(0,6);
    const maxS = Math.max(...top.map(s=>s[1]),1);
    document.getElementById('statusDist').innerHTML = top.map(([n,c],i)=>`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
        <div style="width:3px;height:18px;border-radius:2px;background:${COLORS[i%COLORS.length]};flex-shrink:0"></div>
        <span style="font-size:11px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${n}</span>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:${COLORS[i%COLORS.length]}">${c}</span>
      </div>`).join('');

    // Status list (direita)
    document.getElementById('statusList').innerHTML = top.map(([n,c],i)=>`
      <div class="status-row">
        <div class="status-left">
          <div style="width:6px;height:6px;border-radius:50%;background:${COLORS[i%COLORS.length]};flex-shrink:0"></div>
          <span class="status-name" title="${n}">${n}</span>
        </div>
        <div class="status-bar-wrap">
          <div class="status-bar-fill" style="width:${Math.round(c/maxS*100)}%;background:${COLORS[i%COLORS.length]}"></div>
        </div>
        <span class="status-cnt" style="color:${COLORS[i%COLORS.length]}">${c}</span>
      </div>`).join('') || '<div class="no-data">Sem dados</div>';

    // Agentes
    const aMap = {};
    const add = (t,type) => {
      const name = t.assigneeId&&agentNames[t.assigneeId] ? agentNames[t.assigneeId] : (t.assigneeId?`#${t.assigneeId.slice(-4)}`:'Sem agente');
      if (!aMap[name]) aMap[name]={open:0,pending:0,escalated:0};
      aMap[name][type]++;
    };
    open.forEach(t=>add(t,'open'));
    pending.forEach(t=>add(t,'pending'));
    escalated.forEach(t=>add(t,'escalated'));
    const agents = Object.entries(aMap).map(([n,s])=>({n,...s,total:s.open+s.pending+s.escalated})).sort((a,b)=>b.total-a.total);
    const maxA = Math.max(...agents.map(a=>a.total),1);
    const LIM = 12;
    const PAL = [['#2a1f10','var(--yellow)'],['#1e1525','var(--purple)'],['#0f2018','var(--green)'],['#1f1010','var(--red)'],['#0f1a20','var(--cyan)'],['#201510','var(--orange)']];
    document.getElementById('agentRows').innerHTML = agents.map((a,i)=>{
      const [bg,fg]=PAL[i%PAL.length];
      const init=a.n.split(' ').filter(Boolean).map(w=>w[0]).slice(0,2).join('').toUpperCase();
      const ow=Math.round(a.open/maxA*100), pw=Math.round(a.pending/maxA*100), ew=Math.round(a.escalated/maxA*100);
      const cls=a.total>=LIM?'danger':a.total>=LIM*.75?'warn':'ok';
      const sub=a.total>=LIM?`▲ Sobrecarga — ${a.total}`:a.escalated>0?`${a.total} · ${a.escalated} esc.`:`${a.total} tickets`;
      return `<div class="agent-row">
        <div class="avatar" style="background:${bg};color:${fg}">${init}</div>
        <div>
          <div class="agent-name">${a.n}</div>
          <div class="agent-bar-wrap">
            <div class="agent-seg" style="width:${ow}%;background:var(--yellow)"></div>
            <div class="agent-seg" style="width:${pw}%;background:var(--orange)"></div>
            <div class="agent-seg" style="width:${ew}%;background:var(--red)"></div>
          </div>
          <div class="agent-sub ${cls}">${sub}</div>
        </div>
        <div class="agent-total ${cls}">${a.total}</div>
      </div>`;
    }).join('')||'<div class="no-data">Nenhum agente ativo</div>';

    // Críticos
    const crit = allActive.filter(t=>t.dueDate).map(t=>({...t,msLeft:new Date(t.dueDate)-now})).filter(t=>t.msLeft<12*3600000).sort((a,b)=>a.msLeft-b.msLeft).slice(0,10);
    document.getElementById('critCount').textContent = crit.length;
    const fSla = ms => {
      if(ms<0) return `<span class="sla-b">Rompido</span>`;
      const h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000);
      return ms<2*3600000?`<span class="sla-b">${h}h${m}m</span>`:`<span class="sla-w">${h}h${m}m</span>`;
    };
    const fPill = s => {
      if(!s) return '<span class="pill pill-y">Aberto</span>';
      const sl=s.toLowerCase();
      if(sl.includes('continuidade')||sl.includes('open')||sl.includes('aberto')) return `<span class="pill pill-y">${s}</span>`;
      if(sl.includes('hold')||sl.includes('pendente')||sl.includes('aguardando')) return `<span class="pill pill-o">${s}</span>`;
      if(sl.includes('fechado')) return `<span class="pill pill-g">${s}</span>`;
      return `<span class="pill pill-n">${s}</span>`;
    };
    document.getElementById('critRows').innerHTML = crit.length ? crit.map(t=>{
      const ag=t.assigneeId&&agentNames[t.assigneeId]?agentNames[t.assigneeId].split(' ')[0]:'—';
      return `<tr>
        <td><span class="t-num">#${t.ticketNumber}</span></td>
        <td><span class="t-sub">${t.subject||'—'}</span></td>
        <td style="color:var(--muted);font-size:12px">${ag}</td>
        <td>${fPill(t.status)}</td>
        <td>${fSla(t.msLeft)}</td>
      </tr>`;
    }).join('') : '<tr><td colspan="5" class="no-data">Nenhum ticket crítico no momento ✓</td></tr>';
  }

  show('viewLoading');
  loadData();
  setInterval(loadData, 60000);
</script>
</body>
</html>
